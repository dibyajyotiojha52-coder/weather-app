<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="title-block">
                <h1>Weather Forecast</h1>
                <p id="current-date" class="current-date"></p>
            </div>
            <button id="dark-mode-toggle" class="toggle-btn">🌙 Dark Mode</button>
        </header>
        <div class="search-container">
            <input type="text" id="city-input" placeholder="Enter city name" />
            <button id="search-btn">Search</button>
            <button id="location-btn" class="location-btn">📍 Use My Location</button>
        </div>
        <div id="weather-info" class="weather-info hidden">
            <div class="location-header">
                <h2 id="location"></h2>
                <button id="google-maps-btn" class="google-maps-btn">🗺️ View on Google Maps</button>
            </div>
            <div class="current-weather">
                <div class="temp">
                    <span id="temperature"></span>
                    <span id="condition"></span>
                </div>
                <div class="details">
                    <p>Humidity: <span id="humidity"></span>%</p>
                    <p>Wind: <span id="wind"></span> km/h</p>
                    <p>Air Quality: <span id="aqi"></span></p>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="weatherChart"></canvas>
            </div>
            <div class="map-container">
                <h3>Location Map</h3>
                <div id="map"></div>
            </div>
            <div class="forecast-container">
                <h3>7-Day Forecast</h3>
                <div id="forecastCards" class="forecast-cards"></div>
            </div>
        </div>
        <div id="error" class="error hidden"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
